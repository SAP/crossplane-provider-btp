# Enviroment variables/secrets that are needed
# CLI_SERVER_URL contains the CLI server URL
# GLOBAL_ACCOUNT contains the subdomain of the global account
# IDP_URL contains the URL of an IDP that can be connected to the global account
# SECOND_DIRECTORY_ADMIN_EMAIL contains a second email (different from the technical user's email) for the directory
# CIS_CENTRAL_BINDING contents from the service binding of a `cis-central` service
# BTP_TECHNICAL_USER
# TECHNICAL_USER_EMAIL contains the email of the BTP_TECHNICAL_USER
# More information in the README.md

name: Custom Upgrade Test Workflow

env:
  GO_VERSION: '1.25'

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      testFilter:
        description: "Go test regex filter passed to 'go test -run'. Leave empty to auto-discover and run all custom upgrade tests"
        required: false
        type: string

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      test-names: ${{ steps.set-matrix.outputs.test-names }}
    steps:
      - name: checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true

      - name: Set matrix with test names
        id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.testFilter }}" ]; then
            # Use the provided filter as a single test entry
            echo "test-names=$(echo '${{ github.event.inputs.testFilter }}' | jq -R . | jq -cs .)" >> $GITHUB_OUTPUT
          else
            # Discover all upgrade tests, excluding the baseline upgrade test
            echo "test-names=$(grep -rh --include='*_test.go' -o -E 'func (Test[A-Za-z0-9_]+)\(t \*testing.T\)' test/upgrade | sed 's/func //;s/(t \*testing.T)//' | grep -v 'Test_BaselineUpgradeProvider' | jq -R . | jq -cs .)" >> $GITHUB_OUTPUT
          fi

      - name: Print test names
        run: |
          echo "Test names: ${{ steps.set-matrix.outputs.test-names }}"

  custom-upgrade-test:
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix:
        testName: ${{ fromJson(needs.prepare-matrix.outputs.test-names) }}
    env:
      # hardcoded BTP CLI version
      btp_cli_version: 2.90.2
    steps:
      - name: checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go version

      - name: Install Helm
        run: |
          curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey | gpg --dearmor | sudo tee /usr/share/keyrings/helm.gpg > /dev/null
          sudo apt-get install apt-transport-https --yes
          echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main" | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list
          sudo apt-get update
          sudo apt-get install -y helm

      - name: Install BTP CLI
        #hardcoded version
        run: |
          curl -LJO https://tools.hana.ondemand.com/additional/btp-cli-linux-amd64-$btp_cli_version.tar.gz --cookie "eula_3_2_agreed=tools.hana.ondemand.com/developer-license-3_2.txt"
          tar -xzf btp-cli-linux-amd64-$btp_cli_version.tar.gz
          cd linux-amd64
          mv btp /usr/local/bin

      - name: Set BUILD_ID
        run: |
          echo "BUILD_ID=${{github.run_number}}" >> $GITHUB_ENV

      - name: Install gettext for envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Run custom upgrade test
        timeout-minutes: 120
        run: |
          make upgrade-test testFilter=${{ matrix.testName }}
        env:
          BUILD_ID: ${{ env.BUILD_ID }}
          CIS_CENTRAL_BINDING: ${{ secrets.CIS_CENTRAL_BINDING }}
          BTP_TECHNICAL_USER: ${{ secrets.BTP_TECHNICAL_USER }}
          CLI_SERVER_URL: ${{ secrets.CLI_SERVER_URL }}
          GLOBAL_ACCOUNT: ${{ secrets.GLOBAL_ACCOUNT }}
          TECHNICAL_USER_EMAIL: ${{ secrets.TECHNICAL_USER_EMAIL }}
          SECOND_DIRECTORY_ADMIN_EMAIL: ${{ secrets.SECOND_DIRECTORY_ADMIN_EMAIL }}
          IDP_URL: ${{ secrets.SECOND_IDP_URL }} # Use a different IDP for the upgrade tests to avoid conflicts
          UPGRADE_TEST_FROM_TAG: "v1.0.3"
          UPGRADE_TEST_TO_TAG: "local"

  cleanup-custom-upgrade-test:
    runs-on: ubuntu-latest
    needs: [prepare-matrix, custom-upgrade-test]
    if: always() && needs.prepare-matrix.result == 'success'
    steps:
      - name: checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install BTP CLI
        env:
          btp_cli_version: 2.90.2
        run: |
          curl -LJO https://tools.hana.ondemand.com/additional/btp-cli-linux-amd64-$btp_cli_version.tar.gz --cookie "eula_3_2_agreed=tools.hana.ondemand.com/developer-license-3_2.txt"
          tar -xzf btp-cli-linux-amd64-$btp_cli_version.tar.gz
          cd linux-amd64
          mv btp /usr/local/bin

      - name: Set BUILD_ID
        run: echo "BUILD_ID=${{ github.run_number }}" >> $GITHUB_ENV

      - name: clean up cluster
        run: |
          go run .github/workflows/cleanup.go
        env:
          BUILD_ID: ${{ env.BUILD_ID }}
          CIS_CENTRAL_BINDING: ${{ secrets.CIS_CENTRAL_BINDING }}
          BTP_TECHNICAL_USER: ${{ secrets.BTP_TECHNICAL_USER }}
          CLI_SERVER_URL: ${{ secrets.CLI_SERVER_URL }}
          GLOBAL_ACCOUNT: ${{ secrets.GLOBAL_ACCOUNT }}

  # required for test matrix status reporting
  custom-upgrade-test-success:
    runs-on: ubuntu-latest
    needs:
      - prepare-matrix
      - custom-upgrade-test
    timeout-minutes: 1
    if: always()
    steps:
      - name: Fail for failed prepare-matrix job
        if: |
          needs.prepare-matrix.result == 'failure' ||
          needs.prepare-matrix.result == 'cancelled'
        run: exit 1
      - name: Fail for failed matrix jobs
        if: |
          needs.custom-upgrade-test.result == 'failure' ||
          needs.custom-upgrade-test.result == 'cancelled'
        run: exit 1
