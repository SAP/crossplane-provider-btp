# Release builds and publish a new release.

# Secrets:
# TEST_REGISTRY_USER: registry user for the container registry
# TEST_REGISTRY_PASSWORD: password for container registry
# Vars:
# REGISTRY_URL: registry url for the container registry

name: Publish Release Candidate

env:
  GO_VERSION: '1.25'

on:
    workflow_dispatch: {}

# Releases need permissions to read and write the repository contents.
# GitHub considers creating releases and uploading assets as writing contents.
permissions:
  contents: write
  packages: write

jobs:
    release:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - name: Set Version
        id: version
        run: echo "version=v0.0.0-$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Print Version Number
        run: echo "Effective version ${{ steps.version.outputs.version }}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: v0.35.0
          install: true


      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Vendor Dependencies
        run: make vendor vendor.check

      - name: Build Images
        run: |
          make build PLATFORM=linux_amd64 VERSION=${{ steps.version.outputs.version }}
          make build PLATFORM=linux_arm64 VERSION=${{ steps.version.outputs.version }}

      - name: Login to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Artifacts to DockerHub
        run: |
          make xpkg.build PLATFORM=linux_amd64 VERSION=${{ steps.version.outputs.version }}
          make xpkg.build PLATFORM=linux_arm64 VERSION=${{ steps.version.outputs.version }}
          make xpkg.release.publish VERSION=${{ steps.version.outputs.version }}
        env:
          XPKG_REG_ORGS: ${{ vars.REGISTRY_URL }}/crossplane

      - name: Build Exporter Binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              GOOS=$GOOS GOARCH=$GOARCH go build \
                -trimpath \
                -o dist/crossplane-provider-btp_exporter_${VERSION}_${GOOS}_${GOARCH} \
                ./cmd/exporter
            done
          done

      - name: Upload Exporter Binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # The binaries will appear in the Artifacts section
          # at the bottom of the workflow run summary page, downloadable as a zip.
          name: exporter-binaries-${{ steps.version.outputs.version }}.zip
          path: dist/crossplane-provider-btp_exporter_*
          retention-days: 14
