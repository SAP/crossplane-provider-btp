<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 400" font-family="sans-serif" font-size="13">

  <!-- Crossplane Provider -->
  <rect x="270" y="20" width="200" height="44" rx="6" fill="#1a73e8" stroke="#1a73e8"/>
  <text x="370" y="47" text-anchor="middle" fill="white" font-weight="bold">Crossplane Provider</text>

  <!-- Arrows down -->
  <line x1="210" y1="64" x2="140" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="64" x2="370" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="64" x2="600" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Native box -->
  <rect x="20" y="120" width="240" height="100" rx="6" fill="#e8f5e9" stroke="#43a047"/>
  <text x="140" y="145" text-anchor="middle" fill="#2e7d32" font-weight="bold">Native — 18 resources</text>
  <rect x="50" y="158" width="180" height="30" rx="4" fill="#a5d6a7" stroke="#43a047"/>
  <text x="140" y="178" text-anchor="middle" fill="#1b5e20">OpenAPI clients</text>

  <!-- Upjet box -->
  <rect x="250" y="120" width="240" height="100" rx="6" fill="#fff3e0" stroke="#fb8c00"/>
  <text x="370" y="145" text-anchor="middle" fill="#e65100" font-weight="bold">Upjet — 5 resources</text>
  <rect x="280" y="158" width="180" height="30" rx="4" fill="#ffcc80" stroke="#fb8c00"/>
  <text x="370" y="178" text-anchor="middle" fill="#bf360c">Terraform subprocess</text>

  <!-- Hybrid box -->
  <rect x="480" y="120" width="240" height="100" rx="6" fill="#e8eaf6" stroke="#5c6bc0"/>
  <text x="600" y="140" text-anchor="middle" fill="#283593" font-weight="bold">Hybrid — 2 resources</text>
  <text x="600" y="158" text-anchor="middle" fill="#283593" font-size="11">ServiceInstance · ServiceBinding</text>
  <rect x="510" y="165" width="180" height="30" rx="4" fill="#9fa8da" stroke="#5c6bc0"/>
  <text x="600" y="185" text-anchor="middle" fill="#1a237e">SM plan resolver + upjet</text>

  <!-- Arrows down to CLI / API -->
  <line x1="140" y1="220" x2="140" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="220" x2="500" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="220" x2="530" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BTP REST APIs -->
  <rect x="20" y="290" width="240" height="44" rx="6" fill="#e3f2fd" stroke="#1e88e5"/>
  <text x="140" y="317" text-anchor="middle" fill="#0d47a1">BTP REST APIs</text>

  <!-- cli.btp.cloud.sap -->
  <rect x="390" y="290" width="240" height="44" rx="6" fill="#fce4ec" stroke="#e53935"/>
  <text x="510" y="317" text-anchor="middle" fill="#b71c1c">cli.btp.cloud.sap</text>

  <!-- Arrows down to BTP backends -->
  <line x1="140" y1="334" x2="300" y2="374" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="334" x2="440" y2="374" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BTP backends -->
  <rect x="270" y="374" width="200" height="16" rx="4" fill="#eceff1" stroke="#90a4ae"/>
  <text x="370" y="386" text-anchor="middle" fill="#37474f">BTP backends</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

</svg>
