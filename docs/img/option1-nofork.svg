<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Crossplane Provider -->
  <rect x="200" y="20" width="200" height="40" rx="6" fill="#1a73e8"/>
  <text x="300" y="45" text-anchor="middle" fill="white" font-weight="bold">Crossplane Provider</text>

  <!-- Arrow -->
  <line x1="300" y1="60" x2="300" y2="95" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- upjet in-process -->
  <rect x="175" y="95" width="250" height="40" rx="6" fill="#fff3e0" stroke="#fb8c00"/>
  <text x="300" y="113" text-anchor="middle" fill="#e65100">upjet</text>
  <text x="300" y="128" text-anchor="middle" fill="#e65100" font-size="11">(in-process, no subprocess)</text>

  <!-- Arrow -->
  <line x1="300" y1="135" x2="300" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SAP BTP TF provider Go package -->
  <rect x="150" y="170" width="300" height="40" rx="6" fill="#fff8e1" stroke="#f9a825"/>
  <text x="300" y="188" text-anchor="middle" fill="#f57f17">SAP BTP Terraform provider</text>
  <text x="300" y="203" text-anchor="middle" fill="#f57f17" font-size="11">(compile-time Go dependency)</text>

  <!-- Arrow -->
  <line x1="300" y1="210" x2="300" y2="245" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- cli.btp.cloud.sap -->
  <rect x="175" y="245" width="250" height="35" rx="6" fill="#fce4ec" stroke="#e53935"/>
  <text x="300" y="267" text-anchor="middle" fill="#b71c1c">cli.btp.cloud.sap → BTP backends</text>
</svg>
