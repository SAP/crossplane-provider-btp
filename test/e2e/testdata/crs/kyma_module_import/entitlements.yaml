apiVersion: account.btp.sap.crossplane.io/v1alpha1
kind: Entitlement
metadata:
  name: kyma-azure-entitlement-module-import
spec:
  forProvider:
    serviceName: kymaruntime
    servicePlanName: azure
    amount: 1
    subaccountRef:
      name: kyma-module-import-subaccount
---
apiVersion: account.btp.sap.crossplane.io/v1alpha1
kind: Entitlement
metadata:
  name: cis-local-entitlement-module-import
spec:
  forProvider:
    serviceName: cis
    servicePlanName: local
    enable: true
    subaccountRef:
      name: kyma-module-import-subaccount
