apiVersion: security.btp.sap.crossplane.io/v1alpha1
kind: SubaccountApiCredential
metadata:
  name: sac-int-subaccountapicredentials
spec:
  forProvider:
    readOnly: false
    subaccountRef:
      name: sac-int-subaccount
  writeConnectionSecretToRef:
    name: xsuaa-creds-subaccountapicredentials-int
    namespace: default