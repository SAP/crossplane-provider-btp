apiVersion: account.btp.sap.crossplane.io/v1alpha1
kind: Subaccount
metadata:
  namespace: default
  name: e2e-test-serviceinstance
spec:
  forProvider:
    displayName: "$BUILD_ID-ServiceInstance Environment Import Test"
    labels:
      safe-to-delete: ["yes"]
      BUILD_ID: ["$BUILD_ID"]
    region: eu10
    subdomain: $BUILD_ID-service-instance-import-e2e-test
    subaccountAdmins:
      - $TECHNICAL_USER_EMAIL