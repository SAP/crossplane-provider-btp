apiVersion: account.btp.sap.crossplane.io/v1alpha1
kind: Subaccount
metadata:
  namespace: default
  name: sub-broker-import-test
spec:
  forProvider:
    displayName: $BUILD_ID-e2e-broker-import-sa
    region: eu10
    subdomain: $BUILD_ID-e2e-broker-import-sa
    labels:
      safe-to-delete: [ "yes" ]
      BUILD_ID: [ "$BUILD_ID" ]
    subaccountAdmins:
      - $TECHNICAL_USER_EMAIL
